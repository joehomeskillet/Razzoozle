# nginx rust-only — W5 cutover FIXED variant (prepared 2026-07-10, W5-Preflight)
# Basis: docs/design/nginx-rust-only.conf (W1g) mit 3 Korrekturen gegen die REALE Topologie:
#   FIX-1: Upstream ist der SEPARATE Container `razzoozle-rust` (source_razzoozle_network,
#          verifiziert erreichbar als razzoozle-rust:3020) — NICHT 127.0.0.1:3020 (wäre
#          connection refused; Rust läuft nicht im App-Container).
#          Variable+resolver = request-time DNS, nginx startet auch wenn Rust down ist.
#   FIX-2: /ws → rewrite auf /socket.io/ (Rust socketioxide serviert NUR /socket.io/,
#          /ws = 404 verifiziert). Damit funktionieren auch node-gepinnte/stale Clients
#          nach dem Flip nahtlos gegen Rust.
#   FIX-3: Kommentar-Runbook aktualisiert: es gibt KEIN razzoozle_nginx_1; nginx lebt im
#          razzoozle-Image (supervisord). Deploy = Commit nach docker/nginx.conf → CD baut
#          Image neu + health-gated recreate (cd-poll.sh) mit Auto-Rollback.

server {
    listen 3000;

    root /app/web;
    index index.html;

    tcp_nodelay on;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Request-time DNS für den Rust-Container (docker embedded DNS).
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $rust_upstream razzoozle-rust:3020;

    # theme.json must stay live — never cache it.
    location = /theme/theme.json {
        alias /app/config/theme/theme.json;
        add_header Cache-Control "no-store";
    }

    location ^~ /theme/ {
        alias /app/config/theme/;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location ^~ /media/ {
        alias /app/config/media/;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Health probe → Rust (URI /healthz wird unverändert durchgereicht).
    location = /healthz {
        proxy_pass http://$rust_upstream;
        access_log off;
        add_header Cache-Control "no-store";
    }

    # WebSocket-Pfad: Node-Legacy /ws → Rust /socket.io/ (FIX-2).
    location /ws {
        rewrite ^/ws/?(.*)$ /socket.io/$1 break;
        proxy_pass http://$rust_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Rust-nativer socket.io-Pfad direkt (Client mit rust-Pin nutzt /_rust via Caddy,
    # aber direkter Container-Zugriff/:3011-Tests sollen auch funktionieren).
    location /socket.io/ {
        proxy_pass http://$rust_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # PWA pinning — backend-agnostisch, unverändert.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(js|css|woff2|woff|png|jpg|jpeg|webp|avif|svg|mp3)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Prometheus metrics — localhost-only Parität zum Ist-Zustand.
    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$rust_upstream;
        access_log off;
        add_header Cache-Control "no-store";
    }

    # REST API → Rust.
    location /api/ {
        proxy_pass http://$rust_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    # Public result-share OG page → Rust.
    location ~ ^/r/[^/]+$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://$rust_upstream;
    }

    # Installed plugins → Rust.
    location ^~ /plugins/ {
        proxy_pass http://$rust_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    # /_rust prefix-Strip bleibt als Übergangs-Shim erhalten (Caddy fängt /_rust normal
    # vorher ab; dieser Block greift nur bei direkten :3011-Zugriffen und schadet nicht).
    location /_rust/ {
        rewrite ^/_rust/(.*)$ /$1 break;
        proxy_pass http://$rust_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # SPA shell — revalidate.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
