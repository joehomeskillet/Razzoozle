server {
    listen 3000;

    root /app/web;
    index index.html;

    # Theme assets (theme.json + uploaded backgrounds) from the config volume.
    # no-store so theme edits take effect immediately. The rest of the config
    # dir (game.json with the manager password) is NOT exposed.
    location /theme/ {
        alias /app/config/theme/;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
