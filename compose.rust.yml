# Razzoozle — Rust backend test system.
#
# The app image (nginx + web build + Node socket) with the web client defaulting
# to the Rust backend, PLUS the standalone Rust game server, plus a shared
# Postgres. nginx proxies /_rust/* to the rust service; /ws still reaches the
# Node socket, so you can switch backends per client from the manager UI.
#
#   docker compose -f compose.rust.yml up -d      ->  http://127.0.0.1:3011
#   docker compose -f compose.rust.yml down       (add -v to also drop the DB)
#
# Independent of compose.node.yml (distinct project name, ports and volumes), so
# both stacks run at once. Both backends here share this stack's Postgres.
name: razzoozle-rust

services:
  app:
    build:
      context: .
      args:
        VITE_DEFAULT_BACKEND: rust
    image: razzoozle-rust-web:2.0
    restart: unless-stopped
    ports:
      - "${RUST_PORT:-3011}:3000"
    environment:
      DATABASE_MODE: ${DATABASE_MODE:-pg}
      DATABASE_URL: postgres://razzoozle:${POSTGRES_PASSWORD:-razzoozle}@postgres:5432/razzoozle
      RAHOOT_SIM_MODE: ${RAHOOT_SIM_MODE:-0}
      COMFYUI_URL: ${COMFYUI_URL:-http://host.docker.internal:8188}
    volumes:
      - config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rust:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 3s
      start_period: 25s
      retries: 5

  rust:
    build:
      context: .
      dockerfile: rust/Dockerfile
    image: razzoozle-server:2.0
    restart: unless-stopped
    environment:
      PORT: 3020
      # Shares the same database + schema as the app; sqlx uses this if set.
      DATABASE_URL: postgres://razzoozle:${POSTGRES_PASSWORD:-razzoozle}@postgres:5432/razzoozle
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: razzoozle
      POSTGRES_USER: razzoozle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-razzoozle}
    volumes:
      - db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U razzoozle -d razzoozle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  config:
  db:
