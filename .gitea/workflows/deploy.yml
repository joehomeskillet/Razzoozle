# Continuous deploy for rahoot.
# Runs on the self-hosted HOST runner (has docker + the live deploy dir).
# The heavy lifting -- source self-update, image build, smoke-test,
# `docker compose up -d`, health-gate and auto-rollback -- lives in
# scripts/deploy.sh, so this workflow stays thin.
# No actions/checkout (the host runner has no node); deploy.sh self-updates the source and runs from a /tmp copy to avoid self-modification.
# An n8n flow can call the same script as a fallback.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rahoot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Build, smoke-test, deploy, health-gate (auto-rollback)
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          cp /nvmetank1/projects/rahoot/source/scripts/deploy.sh "$tmp"
          DEPLOY_DIR=/nvmetank1/projects/rahoot bash "$tmp"
          rm -f "$tmp"
