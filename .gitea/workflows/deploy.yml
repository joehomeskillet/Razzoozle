# Continuous deploy for rahoot.
# The deploy runs on the HOST via the agent-dispatch receiver, not on the
# containerized Gitea runner (which has no host filesystem access). The runner
# just POSTs to the host webhook at 172.22.0.1:8810 (the runner's docker-network
# gateway to the host); the receiver runs scripts/deploy.sh on the host.
# The heavy lifting -- source self-update, image build, smoke-test,
# `docker compose up -d`, health-gate and auto-rollback -- lives in
# scripts/deploy.sh. The runner just triggers and gates on the JSON `ok` field.
# An n8n flow can call the same script as a fallback.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rahoot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Trigger host deploy via agent-dispatch (runs scripts/deploy.sh on the host)
        run: |
          set -euo pipefail
          echo "Triggering host-side deploy (build, smoke, compose up, health-gate, auto-rollback)..."
          resp="$(curl -fsS -X POST \
            -H "X-Webhook-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 800 \
            http://172.22.0.1:8810/hook/host-action/deploy-rahoot)"
          echo "$resp"
          echo "$resp" | grep -q '"ok": *true' || { echo "::error::host deploy reported failure"; exit 1; }
