name: Deploy (dev)

# CD for the razzoozle DEV environment (razzoozle.joelduss.xyz → :3011) is handled
# by the host systemd poller razzoozle-cd.timer (polls main every 5 min, health-gated,
# rollback-safe). This Actions job cannot do the real deploy: on this act_runner the
# self-hosted job runs INSIDE the runner container, which has no host project path,
# no host docker, and no systemctl. So this workflow is a no-op marker only.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: CD marker (real deploy via host razzoozle-cd.timer)
        run: echo "CD is handled by the host razzoozle-cd.timer systemd poller (health-gated). This Actions job is a no-op marker."
