name: i18n-check

# Deterministic i18n gate (SDD docs/planning/i18n-guard-sdd-2026-07-15.md).
# Blocking: JSON validity + deep key parity (check-locales.sh) and missing/invalid
# keys vs source de (@lingual/i18n-check@0.9.5, exactly pinned via root devDep).
# Advisory (continue-on-error): unused/undefined — contains known false positives
# (dynamic keys, namespace binding), must never block.
# Mirror-safe: only SHA-pinned uses: references (like ci.yml), no secrets.

on:
  push:
    branches: [main]
    paths:
      - "packages/web/src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/check-locales.sh"
      - "scripts/locale-sync.mjs"
      - ".gitea/workflows/i18n-check.yml"
  pull_request:
    paths:
      - "packages/web/src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/check-locales.sh"
      - "scripts/locale-sync.mjs"
      - ".gitea/workflows/i18n-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: i18n-${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    name: i18n key gate (missing + invalid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (SHA-pinned, same as ci.yml)
        with:
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      # CI=true makes pnpm non-interactive (same pattern as ci.yml).
      - name: Install dependencies
        run: CI=true corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Locale JSON validity + deep key parity (check-locales.sh, BLOCKING)
        run: bash scripts/check-locales.sh

      - name: i18n-check — missing + invalid keys vs source de (BLOCKING)
        run: corepack pnpm run i18n:check

      - name: i18n-check — unused + undefined keys (ADVISORY, never blocks)
        continue-on-error: true
        run: corepack pnpm run i18n:report
