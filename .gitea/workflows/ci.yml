name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enforce the load-bearing design.md guardrails (no active backdrop-blur,
      # no gated glass-* on live surfaces, scrim 0). Fast, no deps needed.
      - name: Design guardrails
        run: bash scripts/check-guardrails.sh

      # The socket transcodes images to WebP via the `cwebp` CLI (config.ts:
      # saveEphemeralAvatar / saveBackgroundImage / saveMediaFile). The Dockerfile
      # runner stage installs Alpine's `libwebp-tools` for this; the CI container is
      # Debian/bookworm, where the equivalent package providing `cwebp` is `webp`.
      - name: Install cwebp (libwebp)
        run: apt-get update && apt-get install -y webp

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (all packages)
        run: corepack pnpm -r run types

      - name: Lint (warn-only)
        run: corepack pnpm lint

      - name: Test (all packages with a test script)
        run: corepack pnpm -r --if-present run test

      - name: Build (all packages)
        run: corepack pnpm -r run build

  # Rust game-server: unit suite + a REAL multi-question game played to the END
  # (scoring + concurrent players + 0 drops). Gates the Rust container deploy —
  # a boot crash (e.g. the libssl.so.3 regression) or a scoring/flow break fails here.
  rust:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node + npm + curl (for the socket.io real-game smokes)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs npm curl ca-certificates

      - name: Rust real-game test suite (build, cargo test, full game to FINISHED, load)
        run: bash scripts/rust-ci-test.sh
