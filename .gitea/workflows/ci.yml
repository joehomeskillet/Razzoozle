name: CI

# Pipeline design (2026-07-07, scratchpad/RESEARCH-testing-cicd.md Judge synthesis).
# 4 stages as 4 jobs: lint-typecheck -> unit (socket) -> rust gate -> build
# (docker images, main-push only). NO deploy job here — CD stays gated/manual
# on the host razzoozle-cd.timer poller (see deploy.yml); this Actions runner
# has no host docker/systemctl access.
#
# (SHA-pinned checkout, concurrency cancel-in-progress, docker-availability guard).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (SHA-pinned)
        with:
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      # CI=true makes pnpm non-interactive (no removal-confirm prompt without a TTY).
      - name: Install dependencies
        run: CI=true corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (all packages)
        run: corepack pnpm -r run types

      - name: Lint (warn-only)
        run: corepack pnpm lint

  unit:
    name: unit tests (socket)
    needs: lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (SHA-pinned)
        with:
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      # The socket transcodes uploaded/AI-generated images to WebP (avatar.test.ts,
      # media.test.ts shell out to cwebp). Debian/bookworm runner package is `webp`.
      - name: Install cwebp (libwebp)
        run: apt-get update && apt-get install -y webp

      - name: Install dependencies
        run: CI=true corepack pnpm install --frozen-lockfile --ignore-scripts

      # Blocking gate: the FULL @razzoozle/socket suite. Green since 2026-07-07
      # (555 passed / 0 failed / 6 DB-guarded skips) — commit 554cee39 fixed the
      # former 2 stale reds (lobby-disconnect, player-manager). Any red test is
      # a regression and fails CI hard. This step is intentionally NOT
      # continue-on-error.
      - name: Socket unit tests (blocking gate)
        run: CI=true corepack pnpm --filter @razzoozle/socket exec vitest run

  rust:
    name: rust gate
    needs: lint-typecheck
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (SHA-pinned)
        with:
          persist-credentials: false

      # /config (incl. config/quizz) is entirely gitignored — a fresh checkout
      # NEVER has it. rust/gate.sh itself only `cargo build`s + compiles tests
      # (--no-run, no runtime boot), so today it does not actually execute code
      # that reads config/quizz. We still materialize a synthetic, minimal,
      # 1-question fixture here so this job is hermetic and self-contained
      # (matches the shape GameRegistry::load_quizzes expects — see
      # rust/server/src/state.rs) instead of silently depending on host state
      # that only happens to exist on a non-ephemeral runner. CI-only,
      # throwaway — never commit this fixture.
      - name: Seed synthetic minimal config/quizz fixture (CI-only, gitignored dir)
        run: |
          mkdir -p config/quizz
          cat > config/quizz/ci-fixture-quiz.json <<'EOF'
          {
            "subject": "CI Fixture Quiz",
            "questions": [
              {
                "question": "1 + 1 = ?",
                "answers": ["1", "2", "3", "4"],
                "solutions": [1],
                "cooldown": 1,
                "time": 5
              }
            ]
          }
          EOF

      # Deterministic gate: build + compile tests + anti-regression feature
      # markers (see rust/gate.sh). The FULL real-game smoke suite
      # (scripts/rust-ci-test.sh — boots the server, plays a multi-question
      # game to FINISHED with scoring + concurrent players) still exists and
      # can be run manually/locally, but is intentionally NOT wired into this
      # pass — out of scope for this pipeline redesign (research doc Stage 4,
      # deferred).
      - name: Rust gate (build + compile tests + anti-regression markers)
        run: bash rust/gate.sh

  build:
    name: build docker images (main push only)
    if: gitea.event_name == 'push' && gitea.ref == 'refs/heads/main'
    needs: [unit, rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (SHA-pinned)
        with:
          persist-credentials: false

      # rust/Dockerfile COPYs config/quizz into the runtime image at build time —
      # same gitignored-dir situation as the rust gate job above. Same synthetic
      # fixture, so this BUILD VALIDATION gate is hermetic. This is NOT a deploy:
      # deploy stays on the host razzoozle-cd.timer poller (deploy.yml).
      - name: Seed synthetic minimal config/quizz fixture (CI-only, gitignored dir)
        run: |
          mkdir -p config/quizz
          cat > config/quizz/ci-fixture-quiz.json <<'EOF'
          {
            "subject": "CI Fixture Quiz",
            "questions": [
              {
                "question": "1 + 1 = ?",
                "answers": ["1", "2", "3", "4"],
                "solutions": [1],
                "cooldown": 1,
                "time": 5
              }
            ]
          }
          EOF

      # ponytail: skip when docker/daemon is unavailable on the runner (visible
      # ::warning::, not a silent stub) — mirrors rag-stack's compose-config gate.
      - name: Build web+socket image
        run: |
          if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
            echo "::warning::docker unavailable in runner — web+socket image build skipped"
            exit 0
          fi
          docker build -t razzoozle:ci .

      - name: Build rust image
        run: |
          if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
            echo "::warning::docker unavailable in runner — rust image build skipped"
            exit 0
          fi
          docker build -f rust/Dockerfile -t razzoozle-rust:ci .
