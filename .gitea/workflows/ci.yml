name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (all packages)
        run: corepack pnpm -r run types

      - name: Test (all packages with a test script)
        run: corepack pnpm -r --if-present run test

      - name: Build (all packages)
        run: corepack pnpm -r run build
