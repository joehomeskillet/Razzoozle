# nginx-rust-only.conf — Variant B static role (W5 preparation)
#
# This configuration proxies ALL dynamic traffic to Rust (:3020) instead of Node (:3001).
# Goal: serve both Node.js and Rust backends by swapping this single config file at deploy time,
# without rebuilding the nginx image or any code.
#
# Diff vs current docker/nginx.conf:
# - /healthz, /ws, /metrics, /api, /r, /plugins all proxy to :3020 (Rust) instead of :3001 (Node)
# - /_rust prefix stripping removed (no longer needed; Rust is direct)
# - PWA pinning + theme/media/static asset caching preserved unchanged
#
# Deployment:
# (1) Node mode: cp docker/nginx.conf .../nginx.conf (default, current)
# (2) Rust mode: cp docs/design/nginx-rust-only.conf .../nginx.conf (W5 cutover)
#
# This file is not deployed; it's a reference for W5 switchover planning.

server {
    listen 3000;

    root /app/web;
    index index.html;

    # Lower realtime latency: send small frames immediately, no Nagle batching.
    tcp_nodelay on;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # theme.json must stay live (edited from the Design tab) — never cache it.
    location = /theme/theme.json {
        alias /app/config/theme/theme.json;
        add_header Cache-Control "no-store";
    }

    # Theme assets (backgrounds, quiz/warm-up images, audio) from the config
    # volume — cacheable (uploads use unique filenames). ^~ wins over the
    # immutable regex below so these get a 1-day TTL, not forever.
    location ^~ /theme/ {
        alias /app/config/theme/;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # AI-generated submission media from the config volume — same caching as
    # /theme/ so it behaves like other static assets (unique filenames, 1-day TTL).
    location ^~ /media/ {
        alias /app/config/media/;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Container health probe — proxies to Rust backend on :3020 instead of Node :3001.
    # Exact-match `=` wins over the .js/asset regex and the SPA fallback below,
    # so the probe always reaches the backend, never index.html.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location = /healthz {
        proxy_pass http://127.0.0.1:3020/healthz;
        access_log off;
        add_header Cache-Control "no-store";
    }

    # WebSocket upgrade path for the game loop (Rust backend).
    # Exact-match `=` wins so /ws reaches the socket server, never the SPA.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location /ws {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Don't buffer realtime frames — forward immediately for low latency.
        proxy_buffering off;
    }

    # PWA service worker + its registrar + the manifest must ALWAYS revalidate so
    # a new deploy reaches phones (registerType: autoUpdate). Exact-match `=`
    # locations win over the immutable .js regex below.
    # NO DIFF: PWA pinning is backend-agnostic.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Vite content-hashed assets — safe to cache forever.
    # NO DIFF: static assets are backend-agnostic.
    location ~* \.(js|css|woff2|woff|png|jpg|jpeg|webp|avif|svg|mp3)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Prometheus metrics (P0-4) — DEV-mode observability. Exact-match `=` wins
    # over the /api regex/SPA fallback. Localhost-only: scraped by a sidecar on
    # the host, never reachable from the public internet.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3020;
        access_log off;
        add_header Cache-Control "no-store";
    }

    # REST API — proxy to the Rust backend on :3020.
    # Placed before the SPA fallback so /api/... is never served as index.html.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location /api/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    # Public result-share page — proxy to the Rust backend so it can serve
    # per-result Open Graph HTML (text/html). Matches ONLY a single path segment
    # `/r/<id>` (no sub-paths). Placed before the SPA fallback so /r/:id reaches
    # the backend, never index.html.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location ~ ^/r/[^/]+$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:3020;
    }

    # Installed plugins (ui.js, assets) — proxy to the Rust backend which
    # serves them from config/plugins/<id>/ with proper MIME types and
    # cache headers. Placed before the SPA fallback so /plugins/<id>/* reaches
    # the backend handler, never index.html.
    # DIFF: 127.0.0.1:3001 → 127.0.0.1:3020
    location ^~ /plugins/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    # NOTE: /_rust prefix stripping location REMOVED
    # (was used when web client could choose Node vs Rust via VITE_DEFAULT_BACKEND=rust,
    #  but now Rust is the only backend, so no prefix needed)

    # SPA shell: the entry HTML must revalidate so the asset graph + SW update
    # land on the next visit. no-cache, not no-store.
    # NO DIFF: SPA fallback is backend-agnostic.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
