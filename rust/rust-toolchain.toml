# Pin the toolchain so every worktree, contributor and CI runner build with the
# same rustc (avoids drift). Phase 3 of docs/build-baseline.md. Matches the version
# the build baseline was measured on. Components clippy+rustfmt back the advisory
# gate step in rust/gate.sh.
[toolchain]
channel = "1.96.1"
components = ["clippy", "rustfmt"]
