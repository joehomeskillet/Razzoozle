<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="rz-mark-title">
  <title id="rz-mark-title">Razzoozle</title>
  <!-- Squircle tile: 1E0B3B plate, then frosted-violet overlay (mirrors glass-fill). -->
  <rect x="2" y="2" width="60" height="60" rx="20" fill="#1E0B3B"/>
  <rect x="2" y="2" width="60" height="60" rx="20" fill="#8B5CF6" fill-opacity="0.18"/>
  <!-- 1px top-inner highlight stroke = the glass edge (mirrors glass-highlight). -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="19.5" fill="none"
        stroke="#F5F3FF" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Heavy R: cyan under-stroke (nudged +1px) then near-white face. -->
  <g>
    <path transform="translate(0,1)" fill="#22D3EE" fill-opacity="0.9"
          d="M19 16 h17 a13 13 0 0 1 4 25 l9 11 h-13 l-7-9 h-1 v9 h-12 z M31 27 h-12 v7 h12 a3.5 3.5 0 0 0 0-7 z"/>
    <path fill="#F5F3FF"
          d="M19 16 h17 a13 13 0 0 1 4 25 l9 11 h-13 l-7-9 h-1 v9 h-12 z M31 27 h-12 v7 h12 a3.5 3.5 0 0 0 0-7 z"/>
  </g>
</svg>
